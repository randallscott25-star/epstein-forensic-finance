// DOJ EFTA URL builder — maps file numbers to direct DOJ PDF links
const EFTA_URL = (fileNum) => {
  const padded = String(fileNum).padStart(8,"0");
  const dsMap = {4152:4,4153:4,4354:5,4527:5,7509:7,8007:8,15902:8,16984:8,27772:8,27777:8,29021:8,29024:8,29026:8,91599:9,135763:9,298935:9,299331:9,299332:9,299335:9,403228:9};
  const ds = dsMap[parseInt(fileNum)] || 8;
  const dest = encodeURIComponent(`/epstein/files/DataSet ${ds}/EFTA${padded}.pdf`);
  return `https://www.justice.gov/age-verify?destination=${dest}`;
};
const DS_URL = (n) => `https://www.justice.gov/epstein/doj-disclosures/data-set-${n}-files`;
const FAA_URL = "https://registry.faa.gov/AircraftInquiry/Search/NNumberResult";

// Parse "File 15902 p.71" → { num:"15902", page:"p.71", url }
const parseSrc = (src) => {
  if (!src) return null;
  const m = src.match(/File (\d+)/);
  if (!m) return null;
  return { num:m[1], full:src, url:EFTA_URL(m[1]) };
};

  const arcs = topo.arcs, tf = topo.transform;
  function decodeArc(idx) {
    const rev = idx < 0; const arc = arcs[rev ? ~idx : idx]; const coords = [];
    let x = 0, y = 0;
    for (const [dx, dy] of arc) { x += dx; y += dy; coords.push([x*tf.scale[0]+tf.translate[0], y*tf.scale[1]+tf.translate[1]]); }
    if (rev) coords.reverse(); return coords;
  }
  function decodeRing(indices) {
    let coords = [];
    for (const idx of indices) { const a = decodeArc(idx); coords = coords.concat(a.slice(coords.length ? 1 : 0)); }
    return coords;
  }
  if (obj.type === "GeometryCollection") return { type: "FeatureCollection", features: obj.geometries.map(g => ({ type: "Feature", geometry: { type: g.type, coordinates: g.type === "Polygon" ? g.arcs.map(decodeRing) : g.arcs.map(p => p.map(decodeRing)) } })) };
}
function greatCircle(lat1, lng1, lat2, lng2, n=60) {
  const R = Math.PI/180;
  const [la1,lo1,la2,lo2] = [lat1*R,lng1*R,lat2*R,lng2*R];
  const d = 2*Math.asin(Math.sqrt(Math.sin((la1-la2)/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin((lo1-lo2)/2)**2));
  const pts = [];
  for (let i=0;i<=n;i++) {
    const f = i/n;
    if (d<0.0001) { pts.push([lng1,lat1]); continue; }
    const a = Math.sin((1-f)*d)/Math.sin(d), b = Math.sin(f*d)/Math.sin(d);
    const x = a*Math.cos(la1)*Math.cos(lo1)+b*Math.cos(la2)*Math.cos(lo2);
    const y = a*Math.cos(la1)*Math.sin(lo1)+b*Math.cos(la2)*Math.sin(lo2);
    const z = a*Math.sin(la1)+b*Math.sin(la2);
    pts.push([Math.atan2(y,x)/R, Math.atan2(z,Math.sqrt(x*x+y*y))/R]);
  }
  return pts;
}
const fmt$ = n => n >= 1e6 ? `$${(n/1e6).toFixed(1)}M` : n >= 1e3 ? `$${(n/1e3).toFixed(0)}K` : n ? `$${n}` : "";

  return Object.values(m).sort((a,b)=>b.count-a.count);

const AIRPORT_FREQ = (() => {

                const m3 = d.match(/~?(\d{4})/);
                if (m3) return {f, ym: parseInt(m3[1])*100};
                return {f, ym:0};
              });

              return sorted.map((ev,i) => {
                const yr = ev.date.slice(0,4);
                const mo = ev.date.slice(5,7);
                const months = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                const showYear = yr !== lastYear;
                lastYear = yr;
                const typeIcon = {wire:"→",outflow:"←",transfer:"⟲",art:"◆",formation:"◈",purchase:"■",arrest:"⊞",flight:"✈",fbi:"⚑"}[ev.type]||"●";
                const isHighlight = ev.type==="arrest" || ev.type==="fbi" || (ev.amount && ev.amount >= 20000000);

                // Find correlated flights: same year-month ±1 month
                const evYm = parseInt(yr)*100 + parseInt(mo);
                const correlated = flightDates.filter(fd => {
                  if (fd.ym === 0) return false;
                  // Same year, within ±1 month
                  if (fd.ym >= evYm - 1 && fd.ym <= evYm + 1) return true;
                  // Handle year boundaries (Dec↔Jan)
                  if (evYm % 100 === 1 && fd.ym === (parseInt(yr)-1)*100+12) return true;
                  if (evYm % 100 === 12 && fd.ym === (parseInt(yr)+1)*100+1) return true;
                  // For events with month=0 (year-only), match any flight that year
                  if (parseInt(mo) === 0 && Math.floor(fd.ym/100) === parseInt(yr)) return true;
                  return false;
                }).map(fd => fd.f);

                return <div key={i}>
                  {showYear && <div style={{position:"relative",marginTop:i===0?0:14,marginBottom:6}}>

                  </div>}
                  <div style={{marginBottom:correlated.length > 0 ? 10 : 4}}>
                    <div style={{display:"flex",alignItems:"flex-start",position:"relative"}}>
                      <div style={{position:"absolute",left:-46,width:38,textAlign:"right",fontSize:7,color:S.dim,fontVariantNumeric:"tabular-nums",paddingTop:1}}>{months[parseInt(mo)]}</div>
                      <div style={{position:"absolute",left:-7,width:12,height:12,borderRadius:6,background:ev.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#000",fontWeight:900,zIndex:1,boxShadow:isHighlight?`0 0 8px ${ev.color}`:"none"}}>{typeIcon}</div>
                      <div style={{marginLeft:14,padding:"3px 8px",background:isHighlight?`${ev.color}11`:S.bg,borderRadius:4,border:`1px solid ${ev.color}${isHighlight?"44":"22"}`,flex:1,maxWidth:580}}>
                        <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                          <span style={{fontSize:7.5,fontWeight:700,color:ev.color}}>{ev.entity}</span>
                          {ev.amount && <span style={{fontSize:7,fontWeight:800,color:S.bright,fontVariantNumeric:"tabular-nums"}}>${(ev.amount/1000000).toFixed(1)}M</span>}
                          {correlated.length > 0 && <span style={{fontSize:6,color:S.dim,marginLeft:"auto"}}>✈ {correlated.length} flight{correlated.length>1?"s":""}</span>}
                        </div>
                        <div style={{fontSize:7,color:S.txt,lineHeight:"1.35",marginTop:1}}>{ev.desc}</div>
                      </div>
                    </div>
                    {/* Correlated flights */}
                    {correlated.length > 0 && (
                      <div style={{marginLeft:14,marginTop:2,paddingLeft:8,borderLeft:`1px dashed ${S.dim}33`}}>
                        {correlated.slice(0,5).map((fl,j) => (
                          <div key={j} style={{display:"flex",gap:6,alignItems:"center",padding:"2px 6px",marginBottom:1,background:"rgba(107,114,128,0.06)",borderRadius:3}}>
                            <span style={{fontSize:6.5,color:"#6b7280",fontWeight:700}}>✈</span>
                            <span style={{fontSize:6.5,color:S.dim,width:65,flexShrink:0}}>{fl.date}</span>
                            <span style={{fontSize:6.5,color:S.txt,fontWeight:600}}>{fl.from.code}→{fl.to.code}</span>
                            <span style={{fontSize:6,color:S.dim}}>{fl.tail}</span>
                            <span style={{fontSize:6,color:S.dim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",flex:1}}>
                              {fl.passengers.slice(0,3).join(", ")}{fl.passengers.length>3?` +${fl.passengers.length-3}`:""}
                            </span>
                          </div>
                        ))}
                        {correlated.length > 5 && <div style={{fontSize:6,color:S.dim,paddingLeft:6}}>+{correlated.length-5} more flights in this window</div>}
                      </div>
                    )}
                  </div>
                </div>;
              });
            })()}
          </div>
          {/* Summary stats */}
          <div style={{marginTop:16,background:"rgba(74,144,217,0.05)",border:`1px solid ${S.blue}22`,borderRadius:6,padding:10}}>
            <div style={{fontSize:8,fontWeight:800,color:S.blue,marginBottom:4}}>CORRELATION METHODOLOGY</div>
            <div style={{fontSize:7,color:S.dim,lineHeight:"1.5"}}>
              Flight correlation uses a ±30 day window around each financial event. A flight appearing next to a wire transfer does not prove the wire funded the flight — it shows the aircraft were moving during periods of financial activity. The value is the pattern across 18 years: when you see wire transfers, art sales, and entity formations consistently clustering with flight activity, you're looking at an operation, not coincidence. Wire transfer amounts are automated CHIPS/Fedwire extractions from DS8 (Deutsche Bank/SDNY) and DS11 (financial ledger) bank statement PDFs. Leon Black's $106.5M is independently confirmed via Apollo Global's board review. All other amounts are pipeline-extracted OCR — not audited.
            </div>
          </div>
        </div>
      )}

      {/* ═══ TAB: CBP BORDER ENCOUNTERS ═══ */}
      {tab === "cbp" && (
        <div style={{display:"flex",minHeight:"calc(100vh - 38px)"}}>

            <div style={{display:"grid",gridTemplateColumns:"82px 52px 30px 62px 1fr",gap:4,padding:"4px 8px",marginBottom:2,borderBottom:`1px solid ${S.border}`}}>

            {/* EPSTEIN SECTION */}
            <div style={{marginBottom:16}}>

              </div>
              {CBP_EPSTEIN.map((e,i) => {

                return <div key={i} style={{display:"grid",gridTemplateColumns:"82px 52px 30px 62px 1fr",gap:4,padding:"4px 8px",marginBottom:1,borderLeft:`2px solid ${isFinal?S.accent:S.danger}44`,background:i%2===0?"rgba(255,255,255,0.01)":"transparent",borderRadius:2}}>

                  <div style={{fontSize:7,color:e.aircraft!=="—"?S.txt:S.dim}}>{e.aircraft}</div>
                  <div>
                    <div style={{fontSize:7.5,color:S.txt,lineHeight:"1.35"}}>{e.note}</div>
                    {e.companions.length > 0 && <div style={{fontSize:7,color:S.purple,marginTop:1,fontWeight:600}}>

              })}
              <div style={{marginTop:6,padding:6,background:"rgba(239,68,68,0.05)",borderRadius:4,border:`1px solid ${S.danger}22`}}>
                <div style={{fontSize:7,color:S.dim,lineHeight:"1.4"}}>Span: 25 years (1994–2019). First encounter Apr 10, 1994. Final encounter at arrest: Jul 6, 2019 at Teterboro on return from Paris. April 2019: two panic round-trips to Paris in 5 days = unprecedented urgency.</div>
              </div>
            </div>

            {/* MAXWELL SECTION */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:10,fontWeight:900,color:S.purple,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:8,height:8,borderRadius:4,background:S.purple,boxShadow:`0 0 8px ${S.purple}`}}/>
                GHISLAINE MAXWELL — {CBP_MAXWELL.length} encounters (1991–2019)
              </div>
              {CBP_MAXWELL.map((e,i) => {
                const isFinal = e.note.includes("⚠");
                return <div key={i} style={{display:"grid",gridTemplateColumns:"82px 52px 30px 62px 1fr",gap:4,padding:"4px 8px",marginBottom:1,borderLeft:`2px solid ${isFinal?"#ef4444":S.purple}44`,background:isFinal?"rgba(239,68,68,0.06)":i%2===0?"rgba(255,255,255,0.01)":"transparent",borderRadius:2}}>
                  <div style={{fontSize:8.5,fontWeight:isFinal?900:700,color:isFinal?S.danger:S.bright,fontVariantNumeric:"tabular-nums"}}>{e.date}</div>
                  <div style={{fontSize:7.5,color:e.port!=="Unknown"?S.cyan:S.dim,fontWeight:e.port!=="Unknown"?600:400}}>{e.port}</div>
                  <div style={{fontSize:7,color:e.dir==="out"?"#f59e0b":"#22d3ee",fontWeight:700}}>{e.dir==="out"?"OUT":"IN"}</div>
                  <div style={{fontSize:7,color:e.aircraft!=="—"?S.txt:S.dim}}>{e.aircraft}</div>
                  <div>
                    <div style={{fontSize:7.5,color:isFinal?S.danger:S.txt,fontWeight:isFinal?700:400,lineHeight:"1.35"}}>{e.note}</div>

              <div style={{marginTop:6,padding:6,background:"rgba(167,139,250,0.05)",borderRadius:4,border:`1px solid ${S.purple}22`}}>
                <div style={{fontSize:7,color:S.dim,lineHeight:"1.4"}}>Span: 28 years (1991–2019). French citizen, DOB 12/25/1961, passport #94AE21885. Final CBP: Jun 11, 2019 — <span style={{color:S.danger,fontWeight:700}}>same day Epstein flew TEB→LFPB</span>. Did not cross another US border until arrested Jul 2, 2020 in Bradford, NH.</div>

            <div style={{marginTop:8,background:"rgba(201,162,39,0.05)",border:`1px solid ${S.accent}22`,borderRadius:6,padding:12}}>
              <div style={{fontSize:9,fontWeight:800,color:S.accent,marginBottom:6}}>COORDINATED MOVEMENT ANALYSIS</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div style={{background:S.bg,borderRadius:4,padding:8,border:`1px solid ${S.border}`}}>
                  <div style={{fontSize:16,fontWeight:900,color:S.accent}}>Jun 11</div>
                  <div style={{fontSize:8,color:S.dim,marginTop:2}}>Maxwell's FINAL CBP encounter and Epstein's TEB→LFPB departure: same day, same direction. She vanished from the border record.</div>
                </div>
                <div style={{background:S.bg,borderRadius:4,padding:8,border:`1px solid ${S.border}`}}>
                  <div style={{fontSize:16,fontWeight:900,color:S.danger}}>25 days</div>
                  <div style={{fontSize:8,color:S.dim,marginTop:2}}>Between Maxwell's final border crossing (Jun 11) and Epstein's arrest (Jul 6). He returned alone. She didn't surface until Bradford, NH — 386 days later.</div>
                </div>
                <div style={{background:S.bg,borderRadius:4,padding:8,border:`1px solid ${S.border}`}}>
                  <div style={{fontSize:16,fontWeight:900,color:S.cyan}}>2 × Paris</div>
                  <div style={{fontSize:8,color:S.dim,marginTop:2}}>Two round-trips in 5 days (Apr 12–19, 2019). ~14,000 NM. ~$50K+ fuel. Whatever triggered this — document retrieval, asset movement, European contacts — it couldn't wait.</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* FOOTER */}
      <div style={{textAlign:"center",fontSize:7,color:S.dim,padding:"3px 0",borderTop:`1px solid ${S.border}`,background:S.panel,letterSpacing:"0.3px"}}>
        Epstein Financial & Aviation Forensics · N21 · Feb 2026 · Randall Scott Taylor · For the girls.
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
